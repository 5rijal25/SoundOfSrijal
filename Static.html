<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Srijal Pandey — Healing, Mentorship & Career Guidance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;1,400&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Work Sans', sans-serif;
      background: #1B2F29;
      color: #EFEEE4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .card {
      background: #2E4A40;
      border-radius: 24px;
      padding: clamp(2.5rem, 6vw, 4rem) clamp(2rem, 6vw, 4rem);
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 40px 80px -30px rgba(0,0,0,0.5);
    }

    /* Sun / logo mark */
    .mark {
      width: 62px;
      height: 62px;
      margin: 0 auto 1.8rem;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: clamp(1.7rem, 4vw, 2.1rem);
      line-height: 1.15;
      color: #EFEEE4;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-style: italic;
      font-family: 'Fraunces', serif;
      font-size: 1.05rem;
      color: #D98C3D;
      margin-bottom: 2rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #D98C3D;
      border-radius: 2px;
      margin: 0 auto 2rem;
    }

    .label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #D98C3D;
      margin-bottom: 0.3rem;
    }

    .contact-block {
      background: rgba(0,0,0,0.18);
      border-radius: 14px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 1rem;
    }

    .contact-block a {
      display: block;
      font-size: 1.08rem;
      font-weight: 500;
      color: #EFEEE4;
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .contact-block a:hover { color: #EFB88C; }

    .note {
      margin-top: 2rem;
      font-size: 0.88rem;
      color: rgba(239,238,228,0.5);
      line-height: 1.65;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: rgba(239,238,228,0.3);
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Simple sun icon -->
    <svg class="mark" viewBox="0 0 64 64" aria-hidden="true">
      <circle cx="32" cy="32" r="12" fill="#D98C3D"/>
      <g stroke="#D98C3D" stroke-width="2.5" stroke-linecap="round">
        <line x1="32" y1="6"  x2="32" y2="13"/>
        <line x1="32" y1="51" x2="32" y2="58"/>
        <line x1="6"  y1="32" x2="13" y2="32"/>
        <line x1="51" y1="32" x2="58" y2="32"/>
        <line x1="14" y1="14" x2="19" y2="19"/>
        <line x1="45" y1="45" x2="50" y2="50"/>
        <line x1="50" y1="14" x2="45" y2="19"/>
        <line x1="19" y1="45" x2="14" y2="50"/>
      </g>
    </svg>

    <h1>Srijal Pandey</h1>
    <p class="tagline">Healing · Career Guidance · Mentorship</p>

    <div class="divider"></div>

    <!-- EMAIL — replace the address in both places below -->
    <p class="label">Email</p>
    <div class="contact-block">
      <a href="mailto:[srijal.pandey525@gmail.com]">[email protected]</a>
    </div>

    <!-- PHONE — replace the number in both places below -->
    <p class="label">Phone &amp; WhatsApp</p>
    <div class="contact-block">
      <a href="tel:+9779705453329">+9779813452415</a>
    </div>

    <p class="note">
      Sessions available online and in person.<br>
      Reach out to book your first free conversation.
    </p>

  </div>

  <p class="footer">© 2026 Srijal Pandey</p>

</body>
</html>
